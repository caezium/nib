name: Release build

# Verifies that a tagged (or manually dispatched) release actually builds and
# packages on a clean macOS runner. The GitHub Release itself is cut manually
# from the maintainer's machine — `scripts/package-release.sh` builds the same
# ad-hoc-signed .app, zips it, and prints the sha256 for the Homebrew cask
# (caezium/homebrew-tap, Casks/nib.rb). So this workflow does NOT create a
# release (a .dmg draft would both miss the cask's .zip and clobber a published
# tag); it just confirms the build is green and uploads the artifacts.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      # Signing is OPTIONAL. Nib ships ad-hoc-signed + un-notarized (the cask
      # clears the Gatekeeper quarantine flag on install), so these secrets are
      # normally unset and the signing step below is skipped. Set them to sign.
      MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
      MAC_CERTIFICATE_PWD: ${{ secrets.MAC_CERTIFICATE_PWD }}
      MAC_KEYCHAIN_PWD: ${{ secrets.MAC_KEYCHAIN_PWD }}
      MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
      MAC_TEAM_ID: ${{ secrets.MAC_TEAM_ID }}
      MAC_APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
      MAC_APPLE_PASSWORD: ${{ secrets.MAC_APPLE_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only runs when a signing certificate is actually configured. Without it
      # the build is ad-hoc-signed — matching the distributed app — instead of
      # failing on `security import` of an empty certificate.
      - name: Set up macOS code signing
        if: ${{ env.MAC_CERTIFICATE != '' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$MAC_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MAC_KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          curl https://www.apple.com/certificateauthority/AppleRootCA-G3.cer -o AppleRootCA-G3.cer
          curl https://www.apple.com/certificateauthority/AppleWWDRCAG6.cer -o AppleWWDRCAG6.cer
          curl https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o DeveloperIDG2CA.cer
          security import ./AppleRootCA-G3.cer -k $KEYCHAIN_PATH
          security import ./AppleWWDRCAG6.cer -k $KEYCHAIN_PATH
          security import ./DeveloperIDG2CA.cer -k $KEYCHAIN_PATH

          echo "$MAC_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$MAC_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MAC_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build release package
        run: npm run build -- --verbose

      # Package the .app into the same zip the Homebrew cask consumes
      # (ditto preserves the bundle + signature; a plain zip corrupts it).
      - name: Package zip (cask asset)
        run: |
          version="$(node -e "const v=require('./mobrowser.conf.json').app.version; process.stdout.write(\`\${v.major}.\${v.minor}.\${v.patch}\`)")"
          app="build/dist/mac-arm64/bin/Nib.app"
          mkdir -p build/release
          ditto -c -k --keepParent "$app" "build/release/Nib-$version.zip"
          shasum -a 256 "build/release/Nib-$version.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nib-macos-arm64
          path: |
            build/release/*.zip
            build/dist/mac-arm64/pack/*.dmg
          if-no-files-found: error
