syntax = "proto3";

import "google/protobuf/empty.proto";

message SetThemeRequest {
  string theme = 1;
}

message SetUnsavedIconStateRequest {
  // True while the user has icon work that has not been saved to disk.
  bool unsaved = 1;
}

message SaveIconRequest {
  // 16:9 PNG bytes of the chosen illustration variant.
  bytes image_data = 1;
}

message SaveIconResponse {
  // Parent folder of the saved file.
  string saved_path = 1;
  bool canceled = 2;
  // Full path to the saved .png file when the save succeeded.
  string image_path = 3;
}

message ShowPathInFinderRequest {
  // Absolute path to a file or folder to reveal in Finder.
  string path = 1;
}

message GenerateIconRequest {
  string prompt = 1;
  string negative_prompt = 2;
  // Base64-encoded PNG, no data URL prefix. Empty = no reference image.
  string reference_image = 3;
  // Seed for reproducibility. 0 = pick automatically.
  int32 seed = 4;
  // Number of variants to generate. 0 = default (3). Batch mode passes 1.
  int32 variant_count = 5;
  // Look id (see GetStyles). Empty = default look.
  string style = 6;
}

message StyleInfo {
  string id = 1;
  string label = 2;
}

message GetStylesRequest {}

message GetStylesResponse {
  repeated StyleInfo styles = 1;
}

message GenerateIconResponse {
  // Base64-encoded PNG images, no data URL prefix.
  repeated string images = 1;
  string error = 2;
}

message GetOpenAIApiKeyStatusRequest {}

message GetOpenAIApiKeyStatusResponse {
  // True when the OpenAI provider is active (a stored API key is required).
  bool openai_key_required = 1;
  // True when a non-empty OpenAI API key is already stored in preferences.
  bool has_openai_key = 2;
}

message SetOpenAIApiKeyRequest {
  string api_key = 1;
}

message SetOpenAIApiKeyResponse {
  // Empty on success; otherwise a short error message for the user.
  string error = 1;
}

message GetStoredOpenAIApiKeyRequest {}

message GetStoredOpenAIApiKeyResponse {
  // Value from app preferences; empty if none saved.
  string api_key = 1;
}

message OpenExternalUrlRequest {
  // https URL (or other scheme) to open in the system default handler.
  string url = 1;
}

message PickReferenceImageRequest {}

message PickReferenceImageResponse {
  // Base64-encoded image bytes, no data URL prefix. Empty when canceled/failed.
  string image_b64 = 1;
  // MIME type of the selected image, e.g. "image/png".
  string mime = 2;
  // True when the user dismissed the dialog without choosing a file.
  bool canceled = 3;
  // Empty on success; otherwise a short error message for the user.
  string error = 4;
}

// --- Avatar (the persistent reference character) ---

message SetAvatarRequest {
  // Base64-encoded image bytes, no data URL prefix.
  string image_b64 = 1;
  // MIME type, e.g. "image/png".
  string mime = 2;
}

message SetAvatarResponse {
  // Empty on success; otherwise a short error message for the user.
  string error = 1;
}

message GetAvatarRequest {}

message GetAvatarResponse {
  // Stored avatar, base64 with no data URL prefix; empty when none saved.
  string image_b64 = 1;
  string mime = 2;
  bool has_avatar = 3;
}

// --- Generation history ---

message HistoryItem {
  string id = 1;
  // ISO 8601 timestamp.
  string created_at = 2;
  string prompt = 3;
  string style = 4;
  // Small thumbnail (first variant), base64 PNG, no data URL prefix.
  string thumb_b64 = 5;
  // Number of variants stored for this generation.
  int32 count = 6;
}

message GetHistoryRequest {}

message GetHistoryResponse {
  // Newest first.
  repeated HistoryItem items = 1;
}

message GetHistoryItemRequest {
  string id = 1;
}

message GetHistoryItemResponse {
  // Full-resolution variants, base64 PNG, no data URL prefix.
  repeated string images = 1;
}

message ClearHistoryRequest {}

message ClearHistoryResponse {}

// --- Article -> shot list (text LLM) ---

message Shot {
  // 2-4 word title for the illustration.
  string theme = 1;
  // One sentence: the idea to visualize.
  string core_idea = 2;
  // 0-3 very short words suggested as handwritten labels.
  repeated string labels = 3;
}

message FetchArticleRequest {
  // A web page URL to extract readable article text from.
  string url = 1;
}

message FetchArticleResponse {
  // Extracted article as Markdown; empty on failure.
  string markdown = 1;
  string title = 2;
  // Empty on success; otherwise a short error message for the user.
  string error = 3;
}

message MakeShotListRequest {
  string article = 1;
}

message MakeShotListResponse {
  repeated Shot shots = 1;
  // Empty on success; otherwise a short error message for the user.
  string error = 2;
}

service AppService {
  rpc SetTheme(SetThemeRequest) returns (google.protobuf.Empty);
  rpc SetUnsavedIconState(SetUnsavedIconStateRequest) returns (google.protobuf.Empty);
  rpc SaveIcon(SaveIconRequest) returns (SaveIconResponse);
  rpc ShowPathInFinder(ShowPathInFinderRequest) returns (google.protobuf.Empty);
  rpc GenerateIcon(GenerateIconRequest) returns (GenerateIconResponse);
  rpc GetOpenAIApiKeyStatus(GetOpenAIApiKeyStatusRequest) returns (GetOpenAIApiKeyStatusResponse);
  rpc GetStoredOpenAIApiKey(GetStoredOpenAIApiKeyRequest) returns (GetStoredOpenAIApiKeyResponse);
  rpc SetOpenAIApiKey(SetOpenAIApiKeyRequest) returns (SetOpenAIApiKeyResponse);
  rpc OpenExternalUrl(OpenExternalUrlRequest) returns (google.protobuf.Empty);
  rpc PickReferenceImage(PickReferenceImageRequest) returns (PickReferenceImageResponse);
  rpc SetAvatar(SetAvatarRequest) returns (SetAvatarResponse);
  rpc GetAvatar(GetAvatarRequest) returns (GetAvatarResponse);
  rpc FetchArticle(FetchArticleRequest) returns (FetchArticleResponse);
  rpc MakeShotList(MakeShotListRequest) returns (MakeShotListResponse);
  rpc GetStyles(GetStylesRequest) returns (GetStylesResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc GetHistoryItem(GetHistoryItemRequest) returns (GetHistoryItemResponse);
  rpc ClearHistory(ClearHistoryRequest) returns (ClearHistoryResponse);
}
